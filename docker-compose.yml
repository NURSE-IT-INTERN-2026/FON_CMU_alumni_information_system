services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fon_alumni
      POSTGRES_USER: fon_user
      POSTGRES_PASSWORD: fon_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fon_user -d fon_alumni"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fon_user:fon_password@db:5432/fon_alumni
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
