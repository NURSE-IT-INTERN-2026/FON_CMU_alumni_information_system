# Base (production) Compose file. `app` builds the full Dockerfile and runs the
# baked standalone server; the `db` port is NOT exposed to the host.
#
# A companion dev override — docker-compose.override.yml — is auto-merged on top
# of THIS file by plain `docker compose up` (it swaps in the `next dev` server
# with HMR + a source bind-mount, and exposes db:5432 for a host-side dev run).
# The two files are intentionally separate so the invocation picks the runtime:
#
#   Dev (HMR):     docker compose up -d --build app                       # auto-merges the override
#   Prod (deploy): docker compose -f docker-compose.yml up -d --build app  # skips the override
#
# See CLAUDE.md "Dev container hot-reloads via docker-compose.override.yml".

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin:
  uploads:
